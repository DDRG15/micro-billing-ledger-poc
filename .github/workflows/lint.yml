# lint.yml — static analysis on every push and PR
# ruff for style/imports, bandit for security patterns.

name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: ruff check
        run: ruff check ledger.py worker.py

      - name: bandit security scan
        run: bandit -r ledger.py worker.py -ll
