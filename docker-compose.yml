# docker-compose.yml — Micro-Billing-Ledger PoC
# ===============================================
# All secrets and configuration are read from the .env file.
#     Copy .env.example to .env and fill in your values before running.
#
#     For running tests locally, start only the postgres service:
#       docker-compose up -d postgres
#       python test_ledger.py
#     For the full stack:
#       docker-compose up
#
#
#     Para ejecutar tests localmente, iniciar solo el servicio postgres:
#       docker-compose up -d postgres
#       python test_ledger.py
#     Para el stack completo:
#       docker-compose up

services:

  # ---------------------------------------------------------------------------
  # postgres — the database backend
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    ports:
      # Bound to 127.0.0.1 — only this machine can connect directly.
      #     All external DB access must go through the billing/worker services.
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # billing — the FastAPI application
  # ---------------------------------------------------------------------------
  billing:
    build: .
    environment:
      DATABASE_URL:            ${DATABASE_URL}
      STRIPE_WEBHOOK_SECRET:   ${STRIPE_WEBHOOK_SECRET}
      BILLING_API_KEY:         ${BILLING_API_KEY}
    ports:
      # Exposed on localhost only for local development and tests.
      #     In production, traffic reaches billing through Caddy (port 443).
      #     To harden production: remove this port mapping so billing is
      #     only reachable internally via the Docker network.
      - "127.0.0.1:8000:8000"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.50"

  # ---------------------------------------------------------------------------
  # worker — Transactional Outbox drain worker
  # ---------------------------------------------------------------------------
  worker:
    build: .
    command: python worker.py
    environment:
      DATABASE_URL:        ${DATABASE_URL}
      DOWNSTREAM_URL:      ${DOWNSTREAM_URL}
      WORKER_LOG_ONLY:     ${WORKER_LOG_ONLY}
      WORKER_BATCH_SIZE:   ${WORKER_BATCH_SIZE}
      WORKER_POLL_INTERVAL: ${WORKER_POLL_INTERVAL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # caddy — reverse proxy + automatic HTTPS (Phase 8)
  # Handles TLS termination via Let's Encrypt. Set CADDY_DOMAIN in .env
  #     to your real domain and Caddy provisions the certificate automatically.
  #     For local dev with CADDY_DOMAIN=localhost, access via https://localhost
  #     (browser will warn about self-signed cert — expected for localhost).
  #     Or skip Caddy locally and use http://localhost:8000 directly.
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - billing
    restart: unless-stopped

volumes:
  pgdata:
  # caddy_data persists TLS certificates — prevents hitting Let's Encrypt
  #     rate limits on container restarts.
  caddy_data:
  caddy_config:
